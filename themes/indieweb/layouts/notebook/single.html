{{ define "main" }}

<header class="grid-layout-centered">

  <div class="header-left">
    <a href=".."><i>Notebook</i></a>
  </div>

  <div class="header-right">
    {{ partial "links/link-email.html" }}
    {{ partial "links/link-github-website-current.html" . }}
  </div>

</header>

<div class="grid-layout-centered">

  <article class="single-narrow">

    {{ partial "frontmatter.html" . }}

    {{ if .Content }}
        {{ partial "content-parsed.html" . }}
    {{ end }}

  </article>

</div>

{{ end }}
