{{ $target := .Get "target" | default "/#" }}
{{ $title := .Get "title" | default $target }}
{{ $class := .Get "class" | default "" }}
{{ $desc := .Get "desc" | default "" }}

<a href="{{ $target }}" {{if $class}}class="{{$class}}"{{end}}>{{ $title }}</a>

{{ if $desc }}
  <p>{{ partial "content-parsed" (dict "Content" ($desc | markdownify)) }}</p>
{{ end }}
